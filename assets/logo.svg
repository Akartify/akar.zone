<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;800&amp;display=swap');
            .logo-text {
                font-family: 'Outfit', sans-serif;
                font-size: 140px;
                letter-spacing: -2px;
            }
            .akar {
                fill: #f5b915;
                font-weight: 800;
            }
            .zone {
                fill: #ffffff;
                font-weight: 300;
            }
        </style>
    </defs>
    <rect width="100%" height="100%" fill="transparent" />
    <text x="50%" y="55%" text-anchor="middle" dominant-baseline="central" class="logo-text">
        <tspan class="akar">Akar</tspan><tspan class="zone">.zone</tspan>
    </text>
</svg>
